<svg width="520" height="140" viewBox="0 0 520 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qGradient" x1="20" y1="20" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="150" y1="20" x2="480" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Q Icon -->
  <g filter="url(#glow)">
    <rect x="20" y="20" width="90" height="90" rx="26"
          stroke="url(#qGradient)" stroke-width="10" fill="none"/>
    <path d="M78 78 L108 108"
          stroke="url(#qGradient)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Brand Text -->
  <text x="145" y="92"
        font-family="Inter, Arial, sans-serif"
        font-size="64"
        font-weight="700"
        fill="url(#textGradient)">
    Qavero
  </text>
</svg>
